services:
  - type: web
    name: maharashtra-courts
    runtime: python
    plan: free
    region: singapore
    pythonVersion: "3.12.7"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 600
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
