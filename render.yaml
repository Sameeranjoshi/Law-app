services:
  - type: web
    name: maharashtra-courts
    runtime: python
    plan: free
    region: singapore
    pythonVersion: "3.12.7"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 600
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # eCourtsIndia Partner API key. sync: false means it is NOT stored in
      # git — set the value in the Render dashboard (Environment tab). When
      # set, it overrides the obfuscated key embedded in Ecourtindia/secret.py.
      - key: ECOURTS_API_KEY
        sync: false
