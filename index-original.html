<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joshi & Associates — Office Cause List</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0E1B2E; --ink-2:#16263E; --ink-3:#1F3251;
    --parchment:#F6F2E9; --surface:#FFFFFF; --surface-2:#FCFAF2;
    --brass:#B4862E; --brass-2:#9C7222; --brass-soft:#EBDDB6; --brass-wash:#F4ECD7;
    --oxblood:#8C2B2B; --oxblood-soft:#F3E2E0;
    --green:#3F6B52; --green-soft:#E3EDE6;
    --text:#1B2433; --muted:#736E62; --hair:#E5DECB; --hair-2:#27374F;
    --shadow:0 1px 2px rgba(14,27,46,.06),0 8px 24px rgba(14,27,46,.06);
    --shadow-lg:0 12px 40px rgba(14,27,46,.18);
    --r:12px; --r-sm:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--parchment); color:var(--text);
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .deva{font-family:'Noto Sans Devanagari','Inter',sans-serif;}
  h1,h2,h3,h4{font-family:'Spectral',Georgia,serif;font-weight:600;letter-spacing:-.01em;margin:0;color:var(--ink)}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
  a{color:inherit}

  /* ---- Shell ---- */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .sidebar{
    background:var(--ink); color:#C9D3E2; padding:22px 16px;
    display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:12px;padding:4px 8px 18px}
  .crest{width:40px;height:40px;border-radius:10px;flex:none;
    background:linear-gradient(145deg,var(--brass),var(--brass-2));
    display:grid;place-items:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
  .crest svg{width:22px;height:22px}
  .brand .name{font-family:'Spectral',serif;font-weight:600;font-size:17px;color:#fff;line-height:1.1}
  .brand .sub{font-size:11px;color:#7E8DA6;letter-spacing:.04em;text-transform:uppercase;margin-top:3px}
  .navlabel{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#5F6F8C;padding:14px 12px 6px}
  .nav{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-sm);
    color:#AEB9CC;font-size:14px;font-weight:500;border:1px solid transparent;transition:.15s}
  .nav svg{width:18px;height:18px;flex:none;opacity:.85}
  .nav:hover{background:var(--ink-2);color:#E7ECF4}
  .nav.active{background:var(--ink-3);color:#fff;border-color:var(--hair-2)}
  .nav .count{margin-left:auto;background:rgba(180,134,46,.22);color:var(--brass-soft);
    font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px}
  .sidefoot{margin-top:auto;padding:12px;border-top:1px solid var(--hair-2);font-size:11.5px;color:#5F6F8C;line-height:1.6}

  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:16px;padding:18px 32px;border-bottom:1px solid var(--hair);
    background:rgba(246,242,233,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
  .topbar h2{font-size:22px}
  .topbar .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-2);font-weight:600;margin-bottom:2px}
  .topbar .spacer{flex:1}
  .menu-btn{display:none;background:none;border:1px solid var(--hair);border-radius:8px;padding:8px;color:var(--ink)}
  .search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--hair);
    border-radius:30px;padding:8px 14px;width:280px;max-width:38vw}
  .search input{border:none;outline:none;background:none;width:100%;font-size:13.5px}
  .search svg{width:15px;height:15px;color:var(--muted)}
  .content{padding:28px 32px 60px;max-width:1180px;width:100%}

  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--ink);background:var(--ink);
    color:#fff;font-weight:600;font-size:13.5px;padding:9px 16px;border-radius:9px;transition:.15s}
  .btn:hover{background:var(--ink-2)}
  .btn svg{width:16px;height:16px}
  .btn.brass{background:var(--brass);border-color:var(--brass);}
  .btn.brass:hover{background:var(--brass-2)}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--hair)}
  .btn.ghost:hover{background:var(--surface-2);border-color:var(--brass)}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
  .btn.danger{background:transparent;color:var(--oxblood);border-color:var(--oxblood-soft)}
  .btn.danger:hover{background:var(--oxblood-soft)}

  /* ---- Stats ---- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
  .stat{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:18px 18px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brass)}
  .stat.alert::before{background:var(--oxblood)}
  .stat .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .stat .v{font-family:'Spectral',serif;font-size:34px;font-weight:600;color:var(--ink);line-height:1.1;margin-top:8px}
  .stat .meta{font-size:12px;color:var(--muted);margin-top:4px}

  .grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:22px;align-items:start}
  .panel{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow)}
  .panel-h{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--hair)}
  .panel-h h3{font-size:17px}
  .panel-h .tag{margin-left:auto;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .panel-b{padding:8px 20px 18px}

  /* ---- Cause list (signature) ---- */
  .docket{position:relative;padding-left:8px}
  .docket .row{display:flex;gap:16px;padding:14px 4px;border-bottom:1px dashed var(--hair);position:relative}
  .docket .row:last-child{border-bottom:none}
  .datechip{flex:none;width:62px;text-align:center;border-radius:10px;padding:8px 4px;border:1px solid var(--hair);background:var(--surface-2)}
  .datechip .d{font-family:'Spectral',serif;font-size:22px;font-weight:700;line-height:1;color:var(--ink)}
  .datechip .m{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .row.today .datechip{background:var(--brass);border-color:var(--brass)}
  .row.today .datechip .d,.row.today .datechip .m{color:#fff}
  .row.overdue .datechip{background:var(--oxblood);border-color:var(--oxblood)}
  .row.overdue .datechip .d,.row.overdue .datechip .m{color:#fff}
  .row .info{min-width:0;flex:1}
  .row .info .t{font-weight:600;font-size:14.5px;color:var(--ink)}
  .row .info .s{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
  .row .when{margin-left:auto;text-align:right;font-size:12px;color:var(--muted);white-space:nowrap}
  .when .due{font-weight:600}
  .when .due.t-today{color:var(--brass-2)} .when .due.t-over{color:var(--oxblood)}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:30px;border:1px solid transparent}
  .pill.brass{background:var(--brass-wash);color:var(--brass-2);border-color:var(--brass-soft)}
  .pill.green{background:var(--green-soft);color:var(--green)}
  .pill.ox{background:var(--oxblood-soft);color:var(--oxblood)}
  .pill.gray{background:#EFEDE6;color:var(--muted)}

  /* ---- Cases table ---- */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .spacer{flex:1}
  .seg{display:inline-flex;background:var(--surface);border:1px solid var(--hair);border-radius:9px;overflow:hidden}
  .seg button{border:none;background:none;padding:8px 14px;font-size:13px;font-weight:500;color:var(--muted)}
  .seg button.on{background:var(--ink);color:#fff}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);overflow:hidden}
  thead th{text-align:left;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:13px 16px;border-bottom:1px solid var(--hair);background:var(--surface-2)}
  tbody td{padding:14px 16px;border-bottom:1px solid var(--hair);font-size:13.5px;vertical-align:top}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}
  .case-title{font-weight:600;color:var(--ink)}
  .case-sub{font-size:12px;color:var(--muted);margin-top:3px}
  .cnr{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--brass-2);background:var(--brass-wash);padding:1px 6px;border-radius:5px;display:inline-block;margin-top:5px}
  .rowact{display:flex;gap:6px;opacity:.45;transition:.15s}
  tr:hover .rowact{opacity:1}
  .iconbtn{border:1px solid var(--hair);background:var(--surface);border-radius:7px;padding:6px;display:grid;place-items:center;color:var(--muted)}
  .iconbtn:hover{border-color:var(--brass);color:var(--brass-2)}
  .iconbtn svg{width:15px;height:15px}

  .empty{text-align:center;padding:54px 20px;color:var(--muted)}
  .empty svg{width:42px;height:42px;color:var(--brass);opacity:.5;margin-bottom:12px}
  .empty h3{margin-bottom:6px}

  /* ---- Clients ---- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .ccard{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
  .ccard .top{display:flex;align-items:center;gap:12px}
  .avatar{width:42px;height:42px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:'Spectral',serif;font-weight:600;color:#fff;font-size:17px;background:linear-gradient(145deg,var(--ink-3),var(--ink))}
  .ccard h4{font-size:15.5px}
  .ccard .phone{font-size:12.5px;color:var(--muted)}
  .ccard .clist{margin-top:13px;padding-top:13px;border-top:1px solid var(--hair);font-size:12.5px;color:var(--muted);display:flex;flex-direction:column;gap:5px}
  .ccard .acts{display:flex;gap:8px;margin-top:14px}

  /* ---- Notify / eCourts ---- */
  .two{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px;letter-spacing:.01em}
  .field .hint{font-weight:400;color:var(--muted);font-size:11.5px}
  .input,select.input,textarea.input{width:100%;padding:10px 12px;border:1px solid var(--hair);border-radius:9px;background:var(--surface);outline:none;transition:.15s}
  .input:focus{border-color:var(--brass);box-shadow:0 0 0 3px var(--brass-wash)}
  textarea.input{resize:vertical;min-height:120px;line-height:1.6}
  .msgbox{background:var(--surface-2);border:1px dashed var(--hair);border-radius:9px;padding:14px;font-size:13.5px;line-height:1.7;white-space:pre-wrap;min-height:60px}
  .callout{background:var(--brass-wash);border:1px solid var(--brass-soft);border-radius:var(--r);padding:16px 18px;font-size:13px;line-height:1.65;color:#5a4a22}
  .callout strong{color:var(--brass-2)}
  .callout.note{background:var(--surface);border-color:var(--hair);color:var(--text)}
  .steps{counter-reset:s;list-style:none;padding:0;margin:14px 0 0}
  .steps li{position:relative;padding:0 0 14px 38px;font-size:13.5px;color:var(--text)}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:-2px;width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:600;display:grid;place-items:center;font-family:'Spectral',serif}
  .steps li:not(:last-child)::after{content:"";position:absolute;left:11px;top:24px;bottom:2px;width:1px;background:var(--hair)}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(14,27,46,.45);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow:auto}
  .overlay.on{display:flex}
  .modal{background:var(--parchment);border-radius:16px;width:640px;max-width:100%;box-shadow:var(--shadow-lg);overflow:hidden}
  .modal-h{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--hair);background:var(--surface)}
  .modal-h h3{font-size:18px}
  .modal-h .x{margin-left:auto;border:none;background:none;color:var(--muted);font-size:22px;line-height:1;padding:4px}
  .modal-b{padding:20px 22px;max-height:64vh;overflow:auto}
  .modal-f{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--hair);background:var(--surface)}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:80;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .banner{background:var(--oxblood-soft);border:1px solid #E7C9C7;color:var(--oxblood);font-size:12.5px;padding:9px 16px;border-radius:9px;margin-bottom:18px;display:flex;gap:9px;align-items:center}
  .sample-tag{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--brass-2);border:1px solid var(--brass-soft);border-radius:5px;padding:1px 6px;margin-left:8px;font-weight:600}

  .hide{display:none!important}
  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:248px;z-index:60;transform:translateX(-100%);transition:.25s;height:100vh}
    .sidebar.open{transform:none}
    .menu-btn{display:grid;place-items:center}
    .stats{grid-template-columns:1fr 1fr}
    .grid2,.two{grid-template-columns:1fr}
    .content{padding:20px 16px 60px}
    .topbar{padding:14px 16px}
    .search{display:none}
    .frow{grid-template-columns:1fr}
  }
</style>
</head>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">

    <div class="sidefoot">

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>

    <div class="content" id="content"></div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-h"><h3 id="mTitle">New case</h3><button class="x" id="mClose">×</button></div>

<script>
/* =========================================================
   STORAGE  — uses the persistent artifact store when present,
   falls back to an in-memory store so the page never breaks.
   ========================================================= */
const Store = (() => {
  const hasReal = typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';
  const mem = {};
  return {
    real: hasReal,
    async get(k){
      if(!hasReal){ return mem[k] ?? null; }
      try{ const r = await window.storage.get(k); return r ? r.value : null; }
      catch(e){ return null; }
    },
    async set(k,v){
      if(!hasReal){ mem[k]=v; return; }
      try{ await window.storage.set(k,v); }catch(e){ mem[k]=v; }
    }
  };
})();
const KEY = 'lawapp:state:v1';

/* ---- State ---- */
let state = { cases:[], clients:[], settings:{} };
const uid = () => Math.random().toString(36).slice(2,9);

const SAMPLE = {
  clients:[
    {id:'c1', name:'Ramesh Bhausaheb Pawar', deva:'रमेश भाऊसाहेब पवार', phone:'+919423xxxxxx', email:'', note:'Accused — bail matter', sample:true},
    {id:'c2', name:'Sou. Mangala Vitthal Shinde', deva:'सौ. मंगला विठ्ठल शिंदे', phone:'+919011xxxxxx', email:'', note:'Complainant', sample:true},
    {id:'c3', name:'Kopargaon Nagari Sah. Patsanstha', deva:'कोपरगाव नागरी सह. पतसंस्था', phone:'+912423xxxxxx', email:'', note:'Society — recovery', sample:true},
  ],

/* ---- Date helpers ---- */
function addDays(n){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function parseD(s){ if(!s) return null; const d=new Date(s+'T00:00:00'); return isNaN(d)?null:d; }
function fmtD(s){ const d=parseD(s); if(!d) return '—'; return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return ''; return d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'numeric',minute:'2-digit'}); }
function daysUntil(s){ const d=parseD(s); if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((d-t)/86400000); }
function dueText(s){ const n=daysUntil(s); if(n===null) return {t:'—',c:''}; if(n<0) return {t:Math.abs(n)+'d overdue',c:'t-over'}; if(n===0) return {t:'Today',c:'t-today'}; if(n===1) return {t:'Tomorrow',c:''}; return {t:'in '+n+' days',c:''}; }

/* ---- Persist ---- */
let saveTimer=null;
async function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(async()=>{ await Store.set(KEY, JSON.stringify(state)); },200); }
async function load(){
  const raw = await Store.get(KEY);
  if(raw){ try{ state = JSON.parse(raw); }catch(e){ state = JSON.parse(JSON.stringify(SAMPLE)); } }
  else { state = JSON.parse(JSON.stringify(SAMPLE)); await save(); }
  state.settings = state.settings || {};
  if(!state.settings.apiBase) state.settings.apiBase='/api';
  document.getElementById('storeLabel').textContent = Store.real ? 'Records saved on this device' : 'Session only — records reset on reload';
  document.getElementById('storeState').style.color = Store.real ? 'var(--green)' : 'var(--oxblood)';
}

/* ---- Lookups ---- */
const clientById = id => state.clients.find(c=>c.id===id);
function escapeHtml(s){ return (s??'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function docketRow(k){

  return `<div class="row ${cls}">

/* ===== eCourtsIndia integration ===== */
const eciBase = () => (state.settings.apiBase||'/api').replace(/\/$/,'');
const arr = x => Array.isArray(x)?x:[];
function eciTitle(d){
  const p=arr(d.petitioners)[0]||'Petitioner', r=arr(d.respondents)[0]||'Respondent';
  return `${p} v. ${r}`;
}
function eciStatusLabel(d){
  const look=(d.__enum&&d.__enum.caseStatus)||{};
  return look[d.caseStatus]||d.caseStatus||'—';
}
// map an eCourtsIndia courtCaseData object onto our case schema
function eciToCase(d){
  const disposed = (d.caseStatus||'').toUpperCase()!=='PENDING' && !!(d.decisionDate||d.disposalType);
  return {
    title: eciTitle(d),
    cnr: d.cnr||'',
    type: d.caseTypeRaw||d.caseType||'',
    court: d.courtName||'',
    stage: d.purpose||(arr(d.businessOnDateEntries).slice(-1)[0]||{}).nextPurpose||'',
    side: 'Defence',
    next: disposed ? '' : (d.nextHearingDate||''),
    fir: (d.firDetails&&Object.keys(d.firDetails).length)? JSON.stringify(d.firDetails) : '',
    status: disposed?'disposed':'active',
    notes: `Synced from eCourts on ${todayISO()}. ${d.petitionerAdvocates&&d.petitionerAdvocates.length?'Pet. adv: '+arr(d.petitionerAdvocates).join(', ')+'. ':''}Last hearing ${d.lastHearingDate||d.decisionDate||'—'}.`
  };
}
function renderCaseCard(d, ctx){
  const next = d.nextHearingDate?fmtD(d.nextHearingDate):'—';
  const disposed=(d.caseStatus||'').toUpperCase()!=='PENDING';
  const recent = arr(d.historyOfCaseHearings).slice(-4).reverse();
  const exists = state.cases.find(k=>k.cnr && k.cnr.replace(/\s/g,'').toUpperCase()===(d.cnr||'').toUpperCase());
  return `<div class="msgbox" style="text-align:left">
    <div style="font-weight:600;font-size:14.5px;color:var(--ink)">${escapeHtml(eciTitle(d))}</div>
    <div style="margin:4px 0 10px"><span class="cnr">${escapeHtml(d.cnr||'')}</span> <span class="pill ${disposed?'gray':'green'}">${escapeHtml(eciStatusLabel(d))}</span></div>
    <table style="border:none;background:none"><tbody style="font-size:12.5px">
      <tr><td style="border:none;padding:3px 10px 3px 0;color:var(--muted)">Court</td><td style="border:none;padding:3px 0">${escapeHtml(d.courtName||'—')}</td></tr>
      <tr><td style="border:none;padding:3px 10px 3px 0;color:var(--muted)">Next date</td><td style="border:none;padding:3px 0"><b style="color:${disposed?'var(--muted)':'var(--brass-2)'}">${next}</b> ${d.purpose?'· '+escapeHtml(d.purpose):''}</td></tr>
      <tr><td style="border:none;padding:3px 10px 3px 0;color:var(--muted)">Type</td><td style="border:none;padding:3px 0">${escapeHtml(d.caseTypeRaw||d.caseType||'—')}</td></tr>
      <tr><td style="border:none;padding:3px 10px 3px 0;color:var(--muted)">Filed</td><td style="border:none;padding:3px 0">${escapeHtml(d.filingDate||'—')}</td></tr>
    </tbody></table>
    ${recent.length?`<div style="margin-top:10px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Recent history</div>
      <div style="font-size:12px;color:var(--text);margin-top:4px">${recent.map(h=>`${fmtD(h.hearingDate||h.businessOnDate)} — ${escapeHtml(h.purposeOfListing||'')}`).join('<br/>')}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      ${exists
        ? `<button class="btn brass sm" data-eci-update="${escapeHtml(d.cnr)}">Update "${escapeHtml(exists.title).slice(0,24)}…"</button>`
        : `<button class="btn brass sm" data-eci-add="${escapeHtml(d.cnr)}">Add to my cases</button>`}
    </div>
  </div>`;
}
// keep last fetched record so the Add/Update buttons can use it
let _eciLast={};
function bindEciCardButtons(){
  document.querySelectorAll('[data-eci-add]').forEach(b=>b.onclick=()=>eciImport(b.dataset.eciAdd,false));
  document.querySelectorAll('[data-eci-update]').forEach(b=>b.onclick=()=>eciImport(b.dataset.eciUpdate,true));
}
function eciImport(cnr, update){
  const d=_eciLast[(cnr||'').toUpperCase()]; if(!d){ toast('Fetch the case again first'); return; }
  const mapped=eciToCase(d);
  if(update){
    const k=state.cases.find(x=>x.cnr&&x.cnr.replace(/\s/g,'').toUpperCase()===cnr.toUpperCase());
    if(k){ const changed = k.next!==mapped.next; Object.assign(k,{next:mapped.next,stage:mapped.stage,status:mapped.status,court:mapped.court||k.court}); k.sample=false; save(); toast(changed?'Next date updated':'Case already current'); }
  } else {
    mapped.id=uid(); state.cases.push(mapped); save(); toast('Case added — set the client on the Cases tab');
  }
  render();
}
async function eciGet(pathStr){
  const r=await fetch(eciBase()+pathStr,{headers:{'Accept':'application/json'}});
  const j=await r.json().catch(()=>({}));
  if(!r.ok){ const msg=(j.error&&j.error.message)||('HTTP '+r.status); throw new Error(msg); }
  return j;
}
async function fetchCnr(doRefresh){
  const cnrRaw=document.getElementById('eCnr').value.trim();
  const cnr=cnrRaw.replace(/\s/g,'').toUpperCase();
  const out=document.getElementById('eResult');
  if(!cnr){ out.innerHTML='<div class="msgbox">Enter a CNR number first.</div>'; return; }
  if(!/^[A-Z]{4}\d{12}$/.test(cnr)){ out.innerHTML='<div class="msgbox">That doesn\'t look like a 16-character CNR (4 letters + 12 digits). Check and try again.</div>'; return; }
  out.innerHTML='<div class="msgbox">Fetching latest record…</div>';
  try{
    if(doRefresh){
      out.innerHTML='<div class="msgbox">Asking eCourts to re-scrape… (about 10s)</div>';
      await fetch(eciBase()+'/refresh/'+encodeURIComponent(cnr),{method:'POST'}).catch(()=>{});
      await new Promise(r=>setTimeout(r,9000));
    }
    const j=await eciGet('/case/'+encodeURIComponent(cnr));
    const d=j.data&&j.data.courtCaseData;
    if(!d){ out.innerHTML='<div class="msgbox">No case data returned for that CNR.</div>'; return; }
    if(j.data.descriptions&&j.data.descriptions.enumLookup) d.__enum=j.data.descriptions.enumLookup;
    _eciLast[(d.cnr||cnr).toUpperCase()]=d;
    out.innerHTML=renderCaseCard(d);
    bindEciCardButtons();
  }catch(e){
    out.innerHTML=`<div class="msgbox">Couldn't fetch (<b>${escapeHtml(e.message)}</b>). If you see "no ECI_API_KEY" or a connection error, make sure the office backend is running: <code>node server.js</code>.</div>`;
  }
}
/* ===== bharat-courts JSON import (self-hosted, free) ===== */
function bcNormDate(d){
  if(!d) return '';
  if(/^\d{4}-\d{2}-\d{2}/.test(d)) return d.slice(0,10);
  const m=/^(\d{2})-(\d{2})-(\d{4})$/.exec(d); if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  const dt=new Date(d); return isNaN(dt)?'':dt.toISOString().slice(0,10);
}
function bcTitle(r){
  const p=(r.petitioner||'').trim(), q=(r.respondent||'').trim();
  if(p||q) return `${p||'Petitioner'} v. ${q||'Respondent'}`;
  return r.case_number||'Untitled matter';
}
function bcParse(text){
  let data; try{ data=JSON.parse(text); }catch(e){ throw new Error('That isn\'t valid JSON.'); }
  let rows = Array.isArray(data) ? data
    : (data.items || data.results || (data.case_info ? [data.case_info] : null));
  if(!rows){ rows = (data && (data.cnr_number||data.case_number||data.serial_number!==undefined)) ? [data] : null; }
  if(!rows || !rows.length) throw new Error('No case or cause-list records found in that JSON.');
  return rows;
}
function bcKind(r){
  return (r && r.serial_number!==undefined && (r.item_number!==undefined || r.listing_date!==undefined) && !r.cnr_number) ? 'causelist' : 'case';
}
function importBharatCourts(text){
  const rows=bcParse(text);
  let added=0, updated=0, dated=0, unmatched=0;
  rows.forEach(r=>{
    if(bcKind(r)==='causelist'){
      const cn=(r.case_number||'').replace(/\s/g,'').toLowerCase();
      const k=state.cases.find(c=>
        (c.caseNumber && c.caseNumber.replace(/\s/g,'').toLowerCase()===cn) ||
        (c.cnr && r.cnr_number && c.cnr.toUpperCase()===r.cnr_number.toUpperCase()));
      const d=bcNormDate(r.listing_date);
      if(k && d){ if(k.next!==d){ k.next=d; dated++; } if(!k.stage && r.case_type) k.stage=r.case_type; k.sample=false; }
      else unmatched++;
    } else {
      const cnr=(r.cnr_number||'').toUpperCase();
      const k = cnr ? state.cases.find(c=>c.cnr && c.cnr.toUpperCase()===cnr) : null;
      const next=bcNormDate(r.next_hearing_date);
      const disposed=(r.status||'').toLowerCase().includes('dispos');
      if(k){
        if(r.cnr_number) k.cnr=r.cnr_number;
        if(r.case_number) k.caseNumber=r.case_number;
        if(r.case_type) k.type=r.case_type;
        if(r.court_name) k.court=r.court_name;
        if(next) k.next=next;
        if(disposed) k.status='disposed';
        k.sample=false; updated++;
      } else {
        state.cases.push({ id:uid(), title:bcTitle(r), cnr:r.cnr_number||'', caseNumber:r.case_number||'',
          type:r.case_type||'', court:r.court_name||'', stage:'', side:'Defence',
          next:next||'', fir:'', status:disposed?'disposed':'active',
          notes:`Imported from bharat-courts on ${todayISO()}.`+(r.filing_number?` Filing ${r.filing_number}.`:'') });
        added++;
      }
    }
  });
  state.settings = state.settings || {};
  state.settings.lastImport = new Date().toISOString();
  save();
  const nc=document.getElementById('navCases'); if(nc) nc.textContent=state.cases.filter(x=>x.status!=='disposed').length;
  return { total:rows.length, added, updated, dated, unmatched };
}

/* ---- court-code chips derived from existing CNRs ---- */
function derivedCourtCodes(){
  const set=new Set();
  state.cases.forEach(k=>{ if(k.cnr){ const c=k.cnr.replace(/\s/g,'').toUpperCase(); if(/^[A-Z]{4}\d{12}$/.test(c)) set.add(c.slice(0,6)); }});
  return [...set];
}
let _ciMode='advocate', _ciCodes=new Set();

/* ---- shared result renderer (case index + cause list with CNR) ---- */
function renderEciRows(results, total, box){
  if(!results.length){ box.innerHTML='<div class="msgbox">No matches. Try the cause list, a party name, or fewer filters.</div>'; return; }
  box.innerHTML=(total?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${results.length} of ${total} shown</div>`:'')+
    results.slice(0,25).map(r=>{
      const exists=state.cases.find(k=>k.cnr&&k.cnr.replace(/\s/g,'').toUpperCase()===(r.cnr||'').toUpperCase());
      return `<div class="msgbox" style="margin-bottom:8px;text-align:left">
        <div style="font-weight:600;font-size:13.5px">${escapeHtml(eciTitle(r))}</div>
        <div style="margin:3px 0">${r.cnr?`<span class="cnr">${escapeHtml(r.cnr)}</span> `:''}<span class="pill ${(r.caseStatus||'')==='PENDING'?'green':'gray'}">${escapeHtml(r.caseStatus||r.status||'')}</span>${r.nextHearingDate?` · next ${fmtD(r.nextHearingDate)}`:''}</div>
        <div style="font-size:12px;color:var(--muted)">${escapeHtml(r.courtCode||r.courtName||'')}${r.petitionerAdvocates&&r.petitionerAdvocates.length?' · '+escapeHtml(arr(r.petitionerAdvocates).join(', ')):''}</div>
        ${r.cnr?`<button class="btn ${exists?'ghost':'brass'} sm" style="margin-top:8px" data-eci-load="${escapeHtml(r.cnr)}">${exists?'Already filed':'Open & add'}</button>`:'<div style="font-size:11px;color:var(--muted);margin-top:6px">No CNR in this entry — look it up by case number under CNR lookup.</div>'}
      </div>`;
    }).join('');
  box.querySelectorAll('[data-eci-load]').forEach(b=>b.onclick=()=>{ document.getElementById('eCnr').value=b.dataset.eciLoad; fetchCnr(false); document.getElementById('eResult').scrollIntoView({behavior:'smooth',block:'nearest'}); });
}

/* ---- case index search ---- */
async function caseIndexSearch(){
  const term=document.getElementById('ciTerm').value.trim();
  const status=document.getElementById('ciStatus').value;
  const box=document.getElementById('ciResults');
  if(!term){ box.innerHTML='<div class="msgbox">Enter a search term.</div>'; return; }
  box.innerHTML='<div class="msgbox">Searching the index…</div>';
  const qs=new URLSearchParams();
  if(_ciMode==='advocate') qs.set('advocate',term);
  else if(_ciMode==='litigants') qs.set('litigants',term);
  else qs.set('query',term);
  if(status) qs.set('caseStatuses',status);
  [..._ciCodes].forEach(c=>qs.append('courtCodes',c));
  try{
    const j=await eciGet('/search?'+qs.toString());
    renderEciRows(arr(j.data&&j.data.results), j.data&&j.data.totalHits, box);
  }catch(e){ box.innerHTML=`<div class="msgbox">Search failed (<b>${escapeHtml(e.message)}</b>). Is the backend running?</div>`; }
}

/* ---- court structure (free) ---- */
async function csGet(rest){ const j=await eciGet('/cs/'+rest); return Array.isArray(j)?j:(j.data||[]); }
async function initCourtPicker(){
  const stSel=document.getElementById('clState'); if(!stSel) return;
  const want=state.settings.clState||'MH';
  try{
    const states=await csGet('states');
    if(states.length) stSel.innerHTML=states.map(s=>`<option value="${escapeHtml(s.state)}" ${s.state===want?'selected':''}>${escapeHtml(s.stateName||s.state)}</option>`).join('');
  }catch(e){ /* keep MH default */ }
  stSel.onchange=()=>loadDistricts(stSel.value);
  await loadDistricts(stSel.value||want);
}
async function loadDistricts(st){
  const dSel=document.getElementById('clDist'), cSel=document.getElementById('clComplex');
  if(!dSel) return;
  dSel.innerHTML='<option value="">Loading…</option>'; if(cSel) cSel.innerHTML='<option value="">All complexes</option>';
  try{
    const ds=await csGet('states/'+encodeURIComponent(st)+'/districts');
    dSel.innerHTML='<option value="">All districts</option>'+ds.map(d=>`<option value="${escapeHtml(d.districtCode)}" ${d.districtCode===state.settings.clDist?'selected':''}>${escapeHtml(d.districtName||d.districtCode)}</option>`).join('');
  }catch(e){ dSel.innerHTML='<option value="">Couldn\'t load districts</option>'; }
  dSel.onchange=()=>loadComplexes(st,dSel.value);
  if(dSel.value) loadComplexes(st,dSel.value);
}
async function loadComplexes(st,dc){
  const cSel=document.getElementById('clComplex'); if(!cSel) return;
  if(!dc){ cSel.innerHTML='<option value="">All complexes</option>'; return; }
  cSel.innerHTML='<option value="">Loading…</option>';
  try{
    const cs=await csGet('states/'+encodeURIComponent(st)+'/districts/'+encodeURIComponent(dc)+'/complexes');
    cSel.innerHTML='<option value="">All complexes</option>'+cs.map(c=>`<option value="${escapeHtml(c.courtComplexCode)}">${escapeHtml(c.courtComplexName||c.courtComplexCode)}</option>`).join('');
  }catch(e){ cSel.innerHTML='<option value="">Couldn\'t load complexes</option>'; }
}

/* ---- cause list search ---- */
async function causelistSearch(){
  const box=document.getElementById('clResults');
  const st=document.getElementById('clState').value;
  const dc=document.getElementById('clDist').value;
  const cx=document.getElementById('clComplex').value;
  const date=document.getElementById('clDate').value;
  const name=document.getElementById('clName').value.trim();
  if(!st){ box.innerHTML='<div class="msgbox">Pick a state.</div>'; return; }
  state.settings.clState=st; state.settings.clDist=dc; save();
  box.innerHTML='<div class="msgbox">Searching cause list…</div>';
  const qs=new URLSearchParams(); qs.set('state',st);
  if(dc) qs.set('districtCode',dc); if(cx) qs.set('courtComplexCode',cx);
  if(date) qs.set('date',date); if(name) qs.set('advocate',name);
  try{
    const j=await eciGet('/causelist?'+qs.toString());
    const results=arr(j.data&&j.data.results);
    if(!results.length){ box.innerHTML='<div class="msgbox">No entries for that court and date. Try "Available dates", remove the complex filter, or clear the name.</div>'; return; }
    renderEciRows(results.map(r=>({cnr:r.cnr, caseStatus:r.status, status:r.status, courtName:r.courtName, petitioners:r.petitioners, respondents:r.respondents, petitionerAdvocates:r.advocates, nextHearingDate:r.date})), results.length, box);
  }catch(e){ box.innerHTML=`<div class="msgbox">Cause list search failed (<b>${escapeHtml(e.message)}</b>). Make sure the backend is running.</div>`; }
}
async function causelistDates(){
  const box=document.getElementById('clResults');
  const st=document.getElementById('clState').value, dc=document.getElementById('clDist').value, cx=document.getElementById('clComplex').value;
  const qs=new URLSearchParams(); if(st)qs.set('state',st); if(dc)qs.set('districtCode',dc); if(cx)qs.set('courtComplexCode',cx);
  box.innerHTML='<div class="msgbox">Checking which dates have data…</div>';
  try{ const j=await eciGet('/causelist-dates?'+qs.toString());
    const dates=arr(Array.isArray(j)?j:j.data);
    box.innerHTML=dates.length?`<div class="msgbox"><b>Dates with cause-list data (most recent first):</b><br/>${dates.slice(0,20).map(d=>fmtD(d)).join(' · ')}</div>`:'<div class="msgbox">No dates returned for that scope.</div>';
  }catch(e){ box.innerHTML=`<div class="msgbox">Couldn't fetch dates (<b>${escapeHtml(e.message)}</b>).</div>`; }
}
async function syncAllCases(){
  const log=document.getElementById('eSyncLog');
  const targets=state.cases.filter(k=>k.cnr && /^[A-Za-z]{4}\d{12}$/.test(k.cnr.replace(/\s/g,'')));
  if(!targets.length){ log.classList.remove('hide'); log.innerHTML='No cases have a valid CNR yet. Add CNRs first.'; return; }
  log.classList.remove('hide');
  log.innerHTML='Queuing a fresh scrape for '+targets.length+' case(s)…';
  const cnrs=targets.map(k=>k.cnr.replace(/\s/g,'').toUpperCase());
  try{ await fetch(eciBase()+'/bulk-refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cnrs})}); }catch(e){}
  await new Promise(r=>setTimeout(r,Math.min(30000, 8000+cnrs.length*1500)));
  let updated=0, changed=[];
  for(let i=0;i<targets.length;i++){
    const k=targets[i];
    log.innerHTML=`Fetching ${i+1} / ${targets.length}…`;
    try{
      const j=await eciGet('/case/'+encodeURIComponent(k.cnr.replace(/\s/g,'').toUpperCase()));
      const d=j.data&&j.data.courtCaseData; if(!d) continue;
      const m=eciToCase(d);
      if(m.next && m.next!==k.next){ changed.push(`${k.title.slice(0,28)} → ${fmtD(m.next)}`); }
      Object.assign(k,{next:m.next,stage:m.stage,status:m.status}); k.sample=false; updated++;
    }catch(e){ /* skip individual failures */ }
  }
  save(); render();
  const log2=document.getElementById('eSyncLog');
  if(log2){ log2.classList.remove('hide');
    log2.innerHTML=`<b>Sync complete.</b> ${updated} case(s) refreshed.`+(changed.length?`<br/>New dates:<br/>${changed.map(escapeHtml).join('<br/>')}`:' No date changes.');
  }
  toast('Synced '+updated+' case(s)');
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='joshi-office-backup-'+todayISO()+'.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('Backup downloaded');
}
function importData(e){
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result); if(d.cases&&d.clients){ state=d; state.settings=state.settings||{}; save(); toast('Backup imported'); render(); } else toast('Not a valid backup file'); }catch(err){ toast('Could not read that file'); } };
  rd.readAsText(f); e.target.value='';
}

/* ---- Toast ---- */
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),2200); }

/* ---- Global wiring ---- */
document.querySelectorAll('.nav[data-view]').forEach(n=>n.onclick=()=>go(n.dataset.view));
document.getElementById('primaryAdd').onclick=()=>openCase();
document.getElementById('menuBtn').onclick=()=>document.getElementById('sidebar').classList.toggle('open');
document.getElementById('globalSearch').addEventListener('input',e=>{ query=e.target.value; if(view==='cases'||view==='clients') render(); else { go('cases'); document.getElementById('globalSearch').value=query; } });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---- Boot ---- */
(async function(){ await load(); render(); })();
</script>
